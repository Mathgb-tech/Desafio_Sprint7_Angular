<div class="home-container">

    <!-- Navbar -->
    <nav class="navbar navbar-dark px-4 d-flex justify-content-between align-items-center">
        <img src="http://localhost:3001/img/ford.png" alt="Ford" class="navbar-logo">

        <div class="nav-links d-flex align-items-center gap-4">
            <a routerLink="/home" class="nav-link active">Home</a>
            <a routerLink="/dashboard" class="nav-link">Dashboard</a>
            <button (click)="onLogout()" class="btn btn-outline-danger btn-sm logout-btn">Sair</button>
        </div>
    </nav>

    <!-- Imagem de fundo + cartão de boas-vindas -->
    <div class="hero-section d-flex align-items-center justify-content-center">
        <div class="welcome-card p-5 text-center">
            <img src="http://localhost:3001/img/ford.png" alt="Ford" class="welcome-logo mb-4">
            <h3 class="mb-2">Sistema de Dados FORD</h3>
            <p class="user-greeting mb-4">Seja bem-vindo(a), <span class="highlight">{{ userName || 'Gestor' }}</span>!</p>
            <div class="card-divider mb-4"></div>
            <p class="card-desc mb-4">Gerencie as vendas, conectividade e atualizações de software dos veículos Ford em tempo real.</p>
            <a routerLink="/dashboard" class="btn btn-primary btn-lg w-100 start-btn d-flex align-items-center justify-content-center gap-2">
                Acessar Dashboard
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-arrow-right" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z"/>
                </svg>
            </a>
        </div>
    </div>

</div>
