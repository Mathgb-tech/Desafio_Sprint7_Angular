<div class="home-container">

    <!-- ── Overlay escuro ao abrir sidebar ── -->
    <div class="sidebar-overlay" [class.active]="sidebarOpen" (click)="closeSidebar()"></div>

    <!-- ── Sidebar ── -->
    <aside class="sidebar" [class.open]="sidebarOpen">

        <!-- Cabeçalho da sidebar -->
        <div class="sidebar-header">
            <img src="http://localhost:3001/img/ford.png" alt="Ford" class="sidebar-logo">
            <button class="sidebar-close-btn" (click)="closeSidebar()" aria-label="Fechar menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
                </svg>
            </button>
        </div>

        <!-- Links de navegação -->
        <nav class="sidebar-nav">
            <a routerLink="/home" class="sidebar-link active" (click)="closeSidebar()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4.5a.5.5 0 0 0 .5-.5v-4h2v4a.5.5 0 0 0 .5.5H14a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146z"/>
                </svg>
                <span>Home</span>
            </a>

            <a routerLink="/dashboard" class="sidebar-link" (click)="closeSidebar()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M0 1.5A1.5 1.5 0 0 1 1.5 0h2A1.5 1.5 0 0 1 5 1.5v2A1.5 1.5 0 0 1 3.5 5h-2A1.5 1.5 0 0 1 0 3.5v-2zM6.5 1.5A1.5 1.5 0 0 1 8 0h2A1.5 1.5 0 0 1 11.5 1.5v2A1.5 1.5 0 0 1 10 5H8A1.5 1.5 0 0 1 6.5 3.5v-2zM0 8a1.5 1.5 0 0 1 1.5-1.5h2A1.5 1.5 0 0 1 5 8v2A1.5 1.5 0 0 1 3.5 11.5h-2A1.5 1.5 0 0 1 0 10V8zm6.5 0A1.5 1.5 0 0 1 8 6.5h2A1.5 1.5 0 0 1 11.5 8v2A1.5 1.5 0 0 1 10 11.5H8A1.5 1.5 0 0 1 6.5 10V8z"/>
                    <path d="M13 0h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1V1a1 1 0 0 1 1-1zm0 6.5h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1z"/>
                </svg>
                <span>Dashboard</span>
            </a>
        </nav>

        <!-- Botão Sair no rodapé -->
        <div class="sidebar-footer">
            <button (click)="onLogout()" class="sidebar-logout-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z"/>
                    <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/>
                </svg>
                <span>Sair</span>
            </button>
        </div>
    </aside>

    <!-- ── Navbar com botão hamburguer ── -->
    <nav class="navbar px-4 d-flex justify-content-between align-items-center">
        <button class="hamburger-btn" (click)="toggleSidebar()" aria-label="Abrir menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <img src="http://localhost:3001/img/ford.png" alt="Ford" class="navbar-logo">
    </nav>

    <!-- ── Hero com card de boas-vindas estático ── -->
    <div class="hero-section d-flex align-items-center justify-content-center">
        <div class="welcome-card p-5 text-center">
            <img src="http://localhost:3001/img/ford.png" alt="Ford" class="welcome-logo mb-4">
            <h3 class="mb-2">Sistema de Dados FORD</h3>
            <p class="user-greeting mb-4">Seja bem-vindo(a), <span class="highlight">{{ userName || 'Gestor' }}</span>!</p>
            <div class="card-divider mb-4"></div>
            <p class="card-desc mb-0">Gerencie as vendas, conectividade e atualizações de software dos veículos Ford em tempo real.</p>
        </div>
    </div>

</div>
