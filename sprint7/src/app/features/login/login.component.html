<div class="login-container d-flex">

    <div class="login-image d-flex align-items-center justify-content-center">
        <img src="http://localhost:3001/img/ranger.png" alt="Ford Ranger" class="ranger-img">
    </div>

    <div class="login-form-container d-flex flex-column justify-content-center align-items-center">
        <div class="form-wrapper">

            <img src="http://localhost:3001/img/ford.png" alt="Ford" class="logo mb-3">

            <h3 class="mb-1 text-center">Login</h3>
            <p class="text-center mb-4">
                Bem-vindo! Faça login para acessar o sistema.
            </p>

            <form (ngSubmit)="onLogin()">
                <div class="mb-3">
                    <label class="form-label">Usuário</label>
                    <input type="text" class="form-control" placeholder="Insira seu usuário" [(ngModel)]="username"
                        name="username" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" class="form-control" placeholder="Insira sua senha" [(ngModel)]="password"
                        name="password" required>
                </div>

                <div *ngIf="errorMessage" class="text-danger mb-3 erromensagem">
                    {{ errorMessage }}
                </div>

                <button type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>

        </div>
    </div>

</div>
